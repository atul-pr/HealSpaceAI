# Railway auto-detects Dockerfile — no builder specification needed.

[deploy]
# Using standard sync workers — more reliable for startup
# gevent can cause silent failures when app has heavy ML imports
startCommand = "gunicorn app:app --workers=1 --timeout=120 --bind=0.0.0.0:$PORT --log-level=debug --access-logfile=- --error-logfile=-"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[build]
builder = "nixpacks"

[deploy]
startCommand = "CUDA_VISIBLE_DEVICES=-1 gunicorn app:app --workers=2 --timeout=120 --bind=0.0.0.0:$PORT --log-level=info --access-logfile=- --error-logfile=-"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
